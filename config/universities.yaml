        - "https://study.unimelb.edu.au/how-to-apply/undergraduate-study/international-applications/fees-and-payments"
        - "https://study.unimelb.edu.au/how-to-apply/graduate-coursework-study/international-applications/fees-and-payments"
      living_costs:
        - "https://study.unimelb.edu.au/how-to-apply/fees"
      scholarships:
        - "https://scholarships.unimelb.edu.au"
        - "https://scholarships.unimelb.edu.au/awards/melbourne-international-undergraduate-scholarship"
        - "https://scholarships.unimelb.edu.au/awards/graduate-research-scholarships"
      acceptance_rate:

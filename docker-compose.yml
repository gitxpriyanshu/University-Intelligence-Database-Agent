version: '3.8'

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: uia-agent:latest
    container_name: uia-agent-container
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    env_file:
      - .env
    restart: unless-stopped
